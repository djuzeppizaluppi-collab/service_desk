{% extends "base.html" %}
{% block title %}Редактировать пользователя{% endblock %}
{% block content %}
<div class="card">
  <h2>Редактировать пользователя</h2>
  <form method="post" class="grid grid-2">
    <input name="last_name" value="{{ user.last_name }}" required>
    <input name="first_name" value="{{ user.first_name }}" required>
    <input name="middle_name" value="{{ user.middel_name or '' }}">
    <input type="email" name="email" value="{{ user.email or '' }}" required>
    <input name="mobile" value="{{ user.mobile or '' }}">
    <input name="work_phone" value="{{ user.work_phone or '' }}">
    <input name="title" value="{{ user.title or '' }}">
    <input name="department" value="{{ user.department or '' }}">
    <input name="company" value="{{ user.company or '' }}">
    <select name="role">
      <option value="user" {% if user.role=='user' %}selected{% endif %}>Пользователь</option>
      <option value="specialist" {% if user.role=='specialist' %}selected{% endif %}>Специалист</option>
      <option value="manager" {% if user.role=='manager' %}selected{% endif %}>Менеджер</option>
      <option value="admin" {% if user.role=='admin' %}selected{% endif %}>Администратор</option>
    </select>
    <select name="work_group_uid"><option value="">Рабочая группа</option>{% for wg in work_groups %}<option value="{{ wg.work_group_uid }}">{{ wg.group_name }}</option>{% endfor %}</select>
    <select name="manager_uid"><option value="">Руководитель</option>{% for u in all_users %}<option value="{{ u.user_uid }}" {% if user.manager_uid==u.user_uid %}selected{% endif %}>{{ u.full_name() }}</option>{% endfor %}</select>
    <label><input type="checkbox" name="is_deactivated" {% if user.is_deactivated %}checked{% endif %}> Деактивирован</label>
    <div class="actions"><button class="btn btn-primary" type="submit">Сохранить</button><a class="btn" href="{{ url_for('admin_users') }}">Назад</a></div>
  </form>
</div>
{% endblock %}
