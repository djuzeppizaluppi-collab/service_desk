{% extends "base.html" %}
{% block title %}Создать пользователя{% endblock %}
{% block content %}
<div class="card">
  <h2>Новый пользователь</h2>
  {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
  {% if success %}
  <div class="flash flash-success">Пользователь создан. Логин: <b>{{ temp_login }}</b>, временный пароль: <b>{{ temp_password }}</b></div>
  {% endif %}
  <form method="post" class="grid grid-2">
    <input name="last_name" placeholder="Фамилия" required>
    <input name="first_name" placeholder="Имя" required>
    <input name="middle_name" placeholder="Отчество">
    <input type="email" name="email" placeholder="Email" required>
    <input name="mobile" placeholder="Мобильный">
    <input name="work_phone" placeholder="Рабочий телефон">
    <input name="title" placeholder="Должность">
    <input name="department" placeholder="Отдел">
    <input name="company" placeholder="Компания">
    <select name="gender"><option value="">Пол</option><option value="male">Мужской</option><option value="female">Женский</option></select>
    <select name="role">
      <option value="user">Пользователь</option><option value="specialist">Специалист</option><option value="manager">Менеджер</option><option value="admin">Администратор</option>
    </select>
    <select name="work_group_uid"><option value="">Рабочая группа</option>{% for wg in work_groups %}<option value="{{ wg.work_group_uid }}">{{ wg.group_name }}</option>{% endfor %}</select>
    <select name="manager_uid"><option value="">Руководитель</option>{% for u in all_users %}<option value="{{ u.user_uid }}">{{ u.full_name() }}</option>{% endfor %}</select>
    <div class="actions"><button class="btn btn-primary" type="submit">Создать</button><a class="btn" href="{{ url_for('admin_users') }}">Назад</a></div>
  </form>
</div>
{% endblock %}
