{% extends "base.html" %}
{% block title %}Смена пароля — Service Desk{% endblock %}
{% block content %}
<div class="page-center">
  <div class="card card-narrow">
    <div class="card-header">
      <h2><i data-feather="lock"></i> Смена пароля</h2>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Новый пароль</label>
          <div class="input-icon-wrap input-with-toggle">
            <i data-feather="lock" class="input-icon"></i>
            <input class="form-input" type="password" name="password" id="pw1"
                   placeholder="Минимум 8 символов" required>
            <button type="button" class="pwd-toggle" onclick="togglePwd('pw1',this)">
              <i data-feather="eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Подтверждение</label>
          <div class="input-icon-wrap input-with-toggle">
            <i data-feather="lock" class="input-icon"></i>
            <input class="form-input" type="password" name="confirm_password" id="pw2"
                   placeholder="Повторите пароль" required>
            <button type="button" class="pwd-toggle" onclick="togglePwd('pw2',this)">
              <i data-feather="eye"></i>
            </button>
          </div>
        </div>
        <div class="pwd-hint">
          Пароль должен содержать: заглавные и строчные буквы, цифру, спецсимвол (!@#$%...)
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i data-feather="check"></i> Сохранить пароль
        </button>
      </form>
    </div>
  </div>
</div>
<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.querySelector('[data-feather]').setAttribute('data-feather',
    inp.type === 'password' ? 'eye' : 'eye-off');
  feather.replace();
}
</script>
{% endblock %}
