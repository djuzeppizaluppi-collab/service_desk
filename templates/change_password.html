{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:20px auto;">
  <h2>Смена пароля</h2>
  {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
  <form method="post" class="grid">
    <div><label>Новый пароль</label><input type="password" name="password" required></div>
    <div><label>Подтверждение</label><input type="password" name="confirm_password" required></div>
    <button class="btn btn-primary" type="submit">Сохранить</button>
  </form>
</div>
{% endblock %}
