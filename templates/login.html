<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Service Desk</h1>
    {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
    {% if show_forgot %}<div class="flash">Обратитесь к администратору для сброса пароля.</div>{% endif %}
    <form method="post" action="/login" class="grid">
      <div><label>Логин</label><input type="text" name="login" required></div>
      <div><label>Пароль</label><input type="password" name="password" required></div>
      <button class="btn btn-primary" type="submit">Войти</button>
    </form>
  </div>
</div>
</body>
</html>
