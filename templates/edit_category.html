{% extends "base.html" %}
{% block title %}Редактировать каталог{% endblock %}
{% block content %}
<div class="card">
  <h2>Редактировать запись каталога</h2>
  <form method="post" class="grid grid-2">
    <input name="catalog_name" value="{{ cat.catalog_name }}" required>
    <input name="catalog_icon" value="{{ cat.catalog_icon or 'briefcase' }}">
    <textarea name="catalog_description">{{ cat.catalog_description or '' }}</textarea>
    <select name="work_group_uid"><option value="">Рабочая группа</option>{% for wg in work_groups %}<option value="{{ wg.work_group_uid }}" {% if cat.work_group_uid==wg.work_group_uid %}selected{% endif %}>{{ wg.group_name }}</option>{% endfor %}</select>
    <select name="parent_uid"><option value="">Без родителя</option>{% for c in top_cats %}<option value="{{ c.catalog_uid }}" {% if cat.parent_uid==c.catalog_uid %}selected{% endif %}>{{ c.catalog_name }}</option>{% endfor %}</select>
    <select name="ticket_type"><option value="service_request" {% if cat.ticket_type=='service_request' %}selected{% endif %}>Service Request</option><option value="incident" {% if cat.ticket_type=='incident' %}selected{% endif %}>Incident</option></select>
    <select name="priority"><option value="low" {% if cat.priority=='low' %}selected{% endif %}>Низкий</option><option value="medium" {% if cat.priority=='medium' %}selected{% endif %}>Средний</option><option value="high" {% if cat.priority=='high' %}selected{% endif %}>Высокий</option><option value="critical" {% if cat.priority=='critical' %}selected{% endif %}>Критический</option></select>
    <select name="sla_uid"><option value="">SLA</option>{% for s in slas %}<option value="{{ s.sla_uid }}" {% if cat.sla_uid==s.sla_uid %}selected{% endif %}>{{ s.sla_name }}</option>{% endfor %}</select>
    <label><input type="checkbox" name="approval_required" {% if cat.approval_required %}checked{% endif %}> Требует согласования</label>
    <label><input type="checkbox" name="is_active" {% if cat.is_active %}checked{% endif %}> Активна</label>
    <div class="actions"><button class="btn btn-primary" type="submit">Сохранить</button><a class="btn" href="{{ url_for('admin_categories') }}">Назад</a></div>
  </form>
</div>
{% endblock %}
